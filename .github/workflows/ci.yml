name: CI

on:
  push:
    branches: [main, saralilyb-fixes]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: blacksmith-4vcpu-ubuntu-2204
    defaults:
      run:
        working-directory: plugins/honcho

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Typecheck
        run: bun run typecheck
        continue-on-error: true # typecheck is advisory for now
